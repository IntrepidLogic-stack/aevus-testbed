# ============================================================
# Aevus — CI/CD via SSM (OIDC, no stored SSH key)
#
# Replaces the legacy SSH-key-based deploy at
# .github/workflows/ci-cd.ssh.yml.bak. Migration documented at
# .github/workflows/ci-cd.ssm-pattern.yml.example.
#
# Triggers:
#   • push to main         → run CI + deploy
#   • pull_request → main  → run CI only
#   • workflow_dispatch    → operator-triggered deploy (no CI gate)
#
# Why SSM over SSH:
#   • No SSH key stored in GitHub Actions secrets (zero exfil risk)
#   • Every deploy logged in CloudTrail (audit chain for compliance)
#   • Security group can drop SSH inbound — no public port-22 exposure
#   • Key rotation = IAM role policy update, not a secret rewrite
#
# Records a proper GitHub Deployment for each run so the UI rocket
# icon + deployment history work correctly.
# ============================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual override — operator-triggered deploy that skips the CI gate.
  # Use this when CI is red for reasons orthogonal to the deploy
  # (e.g. dashboard-only changes, flaky tests, lint debt on legacy code).
  workflow_dispatch:
    inputs:
      skip_ci:
        description: "Skip CI gate (use only for dashboard / docs / hotfix)"
        required: false
        default: "false"

permissions:
  id-token: write     # required for AWS OIDC
  contents: read
  deployments: write  # required to create GitHub Deployment records

env:
  AWS_REGION: us-east-1
  DEPLOY_ROLE_ARN: arn:aws:iam::676433090238:role/il-github-actions-deploy
  EC2_INSTANCE_ID: i-017562fca3e3401a8

jobs:
  ci:
    name: CI (lint + syntax)
    runs-on: ubuntu-latest
    # Skip CI entirely on a workflow_dispatch when the operator explicitly
    # asked for a hotfix deploy. Push events always run CI.
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.skip_ci != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff lint (errors + imports only, line-length ignored)
        run: |
          pip install ruff
          # E501 ignored: line-length handled by formatter.
          # E402 ignored: matches pyproject.toml policy — the
          #   secrets_loader pattern legitimately needs late imports.
          ruff check . --select E,F,I --ignore E501,E402
      - name: Python syntax check
        run: find . -name "*.py" -not -path "./.venv/*" -exec python -m py_compile {} +

  deploy:
    name: Deploy to EC2 via SSM
    needs: ci
    # Run deploy when: pushed to main (and CI passed), OR manually dispatched
    # (and CI passed unless operator skipped it). CI's `if:` above handles
    # the skip case; `needs: ci` becomes a no-op dependency when CI was skipped.
    if: |
      always() &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # ── Record a GitHub Deployment so the UI shows the rocket icon ──
      - name: Start GitHub Deployment
        id: gh_deploy
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: production
          environment-url: https://aevus.intrepidlogic.io
          description: "Deploy ${{ github.sha }} by ${{ github.actor }}"

      # ── Assume the deploy role via OIDC ──
      - name: Configure AWS credentials (OIDC, no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Run deploy.sh on the EC2 host via SSM Run Command ──
      - name: Deploy via SSM (no SSH key needed)
        id: ssm
        run: |
          set -euo pipefail
          # deploy.sh requires a $VERSION argument (it errors out with
          # "Usage:" otherwise — that's why prior auto-deploys all
          # failed silently). Format: vYYYY.MM.DD-<short-sha> —
          # monotonic, human-readable, unique per commit, and matches
          # the git-tag convention deploy.sh wants to create.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION="v$(date +%Y.%m.%d)-${SHORT_SHA}"
          echo "Deploying version: $VERSION"
          # jq builds the JSON-quoted commands array so the version
          # interpolates safely without shell-quoting hell.
          COMMANDS=$(jq -nc --arg cmd "sudo -u ubuntu bash /home/ubuntu/aevus-testbed/deploy.sh $VERSION" '[$cmd]')
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name AWS-RunShellScript \
            --parameters "commands=$COMMANDS" \
            --comment "Deploy $VERSION by ${GITHUB_ACTOR}" \
            --query 'Command.CommandId' --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "SSM command: $CMD_ID  (version $VERSION)"

          # Wait for completion; surface logs on either path
          if ! aws ssm wait command-executed \
                --command-id "$CMD_ID" \
                --instance-id "${EC2_INSTANCE_ID}"; then
            echo "::error::Deploy failed — showing remote stderr"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query 'StandardErrorContent' --output text
            exit 1
          fi

          echo "── remote stdout ──"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query 'StandardOutputContent' --output text

      # ── Backend deploy: pull src/ + restart aevus.service if changed ──
      # deploy.sh historically only touched dashboard/ — Python edits were
      # preserved as a safety net against destroying EC2 hotfixes. That left
      # a permanent gap: every backend change (new router, engine module,
      # collector) sat in GitHub but never reached the FastAPI process.
      # The Rickerson Scale 404 (Task #179) exposed this. Backend changes
      # now ship via a second SSM call here, gated on actual src/ diffs.
      - name: Deploy backend src/ if changed
        run: |
          set -euo pipefail
          # The SSM-run script does the change detection on EC2 itself — it
          # has the full git history, while the runner has only a shallow
          # clone. Restart is gated on actual src/ diff so a dashboard-only
          # commit doesn't bounce live connections.
          REMOTE_SCRIPT='set -euo pipefail
cd /home/ubuntu/aevus-testbed
sudo -u ubuntu git fetch origin main 2>&1 | sed "s/^/    /"
if sudo -u ubuntu git diff --quiet HEAD origin/main -- src/ pyproject.toml requirements.txt 2>/dev/null; then
  echo "[backend] no src/ changes — aevus.service untouched"
  exit 0
fi
echo "[backend] src/ changes detected:"
sudo -u ubuntu git diff --name-only HEAD origin/main -- src/ pyproject.toml requirements.txt | sed "s/^/    /"
sudo -u ubuntu git checkout origin/main -- src/ 2>/dev/null || true
sudo -u ubuntu git checkout origin/main -- pyproject.toml 2>/dev/null || true
sudo -u ubuntu git checkout origin/main -- requirements.txt 2>/dev/null || true
echo "[backend] restarting aevus.service..."
sudo systemctl restart aevus.service
sleep 5
echo "[backend] service status: $(systemctl is-active aevus.service)"
curl -sf -o /dev/null -w "[backend] /api/v1/health/ping: %{http_code}\n" http://127.0.0.1:8000/api/v1/health/ping || echo "[backend] ping check failed (may be normal during cold start)"
'
          COMMANDS=$(jq -nc --arg cmd "$REMOTE_SCRIPT" '[$cmd]')
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name AWS-RunShellScript \
            --parameters "commands=$COMMANDS" \
            --comment "Backend deploy by ${GITHUB_ACTOR}" \
            --query 'Command.CommandId' --output text)
          echo "Backend SSM command: $CMD_ID"

          if ! aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "${EC2_INSTANCE_ID}"; then
            echo "::error::Backend deploy failed — remote stderr:"
            aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${EC2_INSTANCE_ID}" --query 'StandardErrorContent' --output text
            exit 1
          fi

          echo "── backend deploy stdout ──"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${EC2_INSTANCE_ID}" --query 'StandardOutputContent' --output text

      # ── Mark the Deployment as success / failure ──
      - name: Mark Deployment success
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          state: success
          deployment-id: ${{ steps.gh_deploy.outputs.deployment_id }}
          environment-url: https://aevus.intrepidlogic.io
          log-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Mark Deployment failure
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          state: failure
          deployment-id: ${{ steps.gh_deploy.outputs.deployment_id }}
          log-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
