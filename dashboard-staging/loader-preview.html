<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aevus Loading Animation</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1920px; height:1080px; overflow:hidden; background:#0B1120; font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif; }

.scene { position:relative; width:1920px; height:1080px; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.scene::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 900px 600px at 50% 42%, rgba(14,165,233,0.1) 0%, transparent 70%); }

/* Particles */
.particles { position:absolute; inset:0; overflow:hidden; }
.p { position:absolute; width:3px; height:3px; border-radius:50%; background:#0EA5E9; opacity:0; }
.p:nth-child(1) { left:15%; top:25%; animation:pf 3s ease-in-out 0.5s infinite; }
.p:nth-child(2) { left:78%; top:20%; animation:pf 2.5s ease-in-out 0.8s infinite; }
.p:nth-child(3) { left:30%; top:72%; animation:pf 3.5s ease-in-out 0.3s infinite; }
.p:nth-child(4) { left:82%; top:68%; animation:pf 2.8s ease-in-out 1.1s infinite; }
.p:nth-child(5) { left:50%; top:15%; animation:pf 3.2s ease-in-out 0.6s infinite; width:4px; height:4px; background:#6D5BD0; }
.p:nth-child(6) { left:12%; top:58%; animation:pf 2.6s ease-in-out 1.4s infinite; }
.p:nth-child(7) { left:68%; top:42%; animation:pf 3.1s ease-in-out 0.9s infinite; width:2px; height:2px; }
.p:nth-child(8) { left:42%; top:82%; animation:pf 2.9s ease-in-out 0.2s infinite; background:#9B70F6; }
.p:nth-child(9) { left:88%; top:38%; animation:pf 3.3s ease-in-out 1.6s infinite; width:2px; height:2px; background:#6D5BD0; }
.p:nth-child(10) { left:22%; top:45%; animation:pf 2.7s ease-in-out 0.7s infinite; }
.p:nth-child(11) { left:58%; top:78%; animation:pf 3.4s ease-in-out 1.2s infinite; background:#9B70F6; width:4px; height:4px; }
.p:nth-child(12) { left:72%; top:12%; animation:pf 2.4s ease-in-out 0.4s infinite; }
@keyframes pf { 0% { opacity:0; transform:translateY(0) scale(0.5); } 25% { opacity:0.5; } 50% { opacity:0.7; transform:translateY(-30px) scale(1); } 75% { opacity:0.3; } 100% { opacity:0; transform:translateY(-60px) scale(0.5); } }

/* Logo */
.logo-wrap { position:relative; width:140px; height:140px; margin-bottom:28px; z-index:1; }
.logo-wrap svg { width:140px; height:140px; filter:drop-shadow(0 0 30px rgba(14,165,233,0.35)); }

.logo-left { stroke-dasharray:300; stroke-dashoffset:300; fill:transparent;
  animation: logoDraw 1.4s cubic-bezier(0.65,0,0.35,1) 0.2s forwards,
             logoFillL 0.6s ease 1.6s forwards; }
.logo-right { stroke-dasharray:250; stroke-dashoffset:250; fill:transparent;
  animation: logoDraw 1.1s cubic-bezier(0.65,0,0.35,1) 0.5s forwards,
             logoFillR 0.6s ease 1.6s forwards; }
.logo-bar { stroke-dasharray:200; stroke-dashoffset:200; fill:transparent;
  animation: logoDraw 0.7s cubic-bezier(0.65,0,0.35,1) 0.9s forwards,
             logoFillB 0.5s ease 1.6s forwards,
             barGlow 2.5s ease-in-out 2.2s infinite; }

@keyframes logoDraw { to { stroke-dashoffset:0; } }
@keyframes logoFillL { to { fill:url(#g1); stroke:transparent; } }
@keyframes logoFillR { to { fill:url(#g1); stroke:transparent; } }
@keyframes logoFillB { to { fill:url(#g2); stroke:transparent; } }
@keyframes barGlow { 0%,100% { filter:none; } 50% { filter:drop-shadow(0 0 8px rgba(109,91,208,0.7)); } }

/* AEVUS text */
.title { font-size:48px; font-weight:700; letter-spacing:10px; color:transparent;
  background:linear-gradient(90deg, #00D4FF, #1490EB, #6D5BD0);
  -webkit-background-clip:text; background-clip:text;
  opacity:0; animation:reveal 0.7s ease 1.8s forwards; z-index:1; margin-bottom:8px; }
@keyframes reveal { to { opacity:1; } }

/* Rotating words */
.tagline-wrap { height:18px; overflow:hidden; margin-bottom:36px; z-index:1; opacity:0; animation:reveal 0.5s ease 2.1s forwards; }
.tagline-track { display:flex; flex-direction:column; animation:wordRotate 4.5s ease-in-out 2.4s infinite; }
.tagline-word { height:18px; line-height:18px; font-size:11px; letter-spacing:4px; color:rgba(148,163,184,0.6); text-transform:uppercase; text-align:center; font-weight:500; }
.tagline-word span { display:inline-block; }
.tagline-word.predict span { color:#00D4FF; }
.tagline-word.prevent span { color:#6D5BD0; }
.tagline-word.perform span { color:#9B70F6; }

@keyframes wordRotate {
  0%, 28% { transform:translateY(0); }
  33%, 61% { transform:translateY(-18px); }
  66%, 94% { transform:translateY(-36px); }
  100% { transform:translateY(0); }
}

/* Progress bar */
.progress-wrap { position:relative; width:200px; height:4px; z-index:1; opacity:0; animation:reveal 0.4s ease 2.3s forwards; margin-bottom:16px; }
.progress-track { position:absolute; inset:0; background:rgba(148,163,184,0.06); border-radius:2px; }
.progress-fill { position:absolute; top:0; left:0; height:100%; border-radius:2px;
  background:linear-gradient(90deg, #0EA5E9, #6D5BD0, #9B70F6);
  width:0; animation:pFill 3s cubic-bezier(0.4,0,0.2,1) 2.5s forwards; }
.progress-glow { position:absolute; top:-3px; height:10px; width:30px; border-radius:5px;
  background:radial-gradient(ellipse, rgba(14,165,233,0.6), transparent);
  filter:blur(3px); left:0; animation:pGlow 3s cubic-bezier(0.4,0,0.2,1) 2.5s forwards; }
@keyframes pFill { 0%{width:0} 25%{width:40%} 50%{width:65%} 75%{width:85%} 100%{width:100%} }
@keyframes pGlow { 0%{left:0} 25%{left:40%} 50%{left:65%} 75%{left:85%} 100%{left:calc(100% - 30px);opacity:0} }

/* Status */
.status { font-size:12px; color:#7B8499; letter-spacing:1.5px; text-transform:uppercase; z-index:1; opacity:0; animation:reveal 0.4s ease 2.5s forwards; }
.status span { animation:pulse 1.8s ease-in-out 2.5s infinite; }
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

/* Scan line effect */
.scanline { position:absolute; width:100%; height:2px; background:linear-gradient(90deg, transparent, rgba(14,165,233,0.08), transparent);
  animation:scan 4s linear 1s infinite; top:0; z-index:2; pointer-events:none; }
@keyframes scan { 0%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100%;opacity:0} }
</style>
</head>
<body>
<div class="scene">
  <div class="scanline"></div>
  <div class="particles">
    <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
    <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
    <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
  </div>

  <div class="logo-wrap">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="52" y1="0" x2="8" y2="100" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#00D4FF"/>
          <stop offset="20%" stop-color="#1490EB"/>
          <stop offset="50%" stop-color="#1560C0"/>
          <stop offset="100%" stop-color="#0B2252"/>
        </linearGradient>
        <linearGradient id="g2" x1="22" y1="0" x2="92" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#102A5C"/>
          <stop offset="45%" stop-color="#6D5BD0"/>
          <stop offset="100%" stop-color="#9B70F6"/>
        </linearGradient>
      </defs>
      <path class="logo-left" d="M48 0 L2 95 L33 95 L48 42 Z" stroke="url(#g1)" stroke-width="2"/>
      <path class="logo-right" d="M48 0 L96 64 L70 64 L48 42 Z" stroke="url(#g1)" stroke-width="2"/>
      <rect class="logo-bar" x="24" y="68" width="68" height="14" rx="4" stroke="url(#g2)" stroke-width="2"/>
    </svg>
  </div>

  <div class="title">AEVUS</div>

  <div class="tagline-wrap">
    <div class="tagline-track">
      <div class="tagline-word predict"><span>P R E D I C T</span></div>
      <div class="tagline-word prevent"><span>P R E V E N T</span></div>
      <div class="tagline-word perform"><span>P E R F O R M</span></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"></div>
    <div class="progress-fill"></div>
    <div class="progress-glow"></div>
  </div>

  <div class="status"><span>Loading</span></div>
</div>
</body>
</html>
