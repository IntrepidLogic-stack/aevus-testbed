<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aevus — Killdeer Twin (Showcase)</title>
<!--
  PATH A: live-data overlay on the rendered diorama image.
  Drop your render at:  /dashboard/images/killdeer-twin-render.png
  Open with:            /dashboard/twin-showcase.html?demo=true
  Tune pin positions:   /dashboard/twin-showcase.html?demo=true&edit=1
                        (drag pins; click "Copy positions" → send me the JSON)

  This is the BODY = a static image. The DATA is live (server-authoritative,
  joined by asset ID), exactly like the Spline twin will be — same data layer,
  different skin. No numbers are baked here; status comes from the twin /flow +
  /health + /alerts endpoints. Honest: equipment without bound telemetry shows a
  neutral status until its asset is wired.
-->
<style>
  :root {
    --teal:#06B6D4; --indigo:#6366F1; --bg:#070B16; --card:rgba(11,16,32,0.82);
    --border:rgba(148,163,184,0.18); --good:#10D478; --warn:#FBBF24; --bad:#EF4444; --muted:#9FB3C8;
    --font:Manrope,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:#E2E8F0; font-family:var(--font); overflow:hidden; }
  #stage { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  #frame { position:relative; max-width:100%; max-height:100%; }
  #render { display:block; max-width:100vw; max-height:100vh; object-fit:contain; }
  #missing { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
             gap:12px; text-align:center; color:var(--muted); border:1px dashed var(--border); border-radius:12px; padding:40px; }
  #missing code { color:var(--teal); font-family:var(--mono); font-size:13px; }
  /* live status pins, positioned by % over the image */
  .pin { position:absolute; transform:translate(-50%,-50%); display:flex; align-items:center; gap:6px;
         pointer-events:none; font-size:11px; white-space:nowrap; }
  .pin .dot { width:13px; height:13px; border-radius:50%; border:2px solid rgba(255,255,255,0.85);
              box-shadow:0 0 10px currentColor; background:currentColor; flex-shrink:0; }
  .pin .dot.live { animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 6px currentColor;} 50%{box-shadow:0 0 16px currentColor,0 0 26px currentColor;} }
  .pin .lbl { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:2px 7px;
              backdrop-filter:blur(6px); color:#E2E8F0; font-weight:600; text-shadow:0 1px 2px #000; }
  .pin .lbl b { color:var(--muted); font-weight:500; font-family:var(--mono); font-size:10px; margin-left:5px; }
  body.edit .pin { pointer-events:auto; cursor:grab; }
  body.edit .pin.drag { cursor:grabbing; }
  /* KPI strip */
  #kpis { position:absolute; left:50%; bottom:18px; transform:translateX(-50%); display:flex; gap:10px;
          background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 16px; backdrop-filter:blur(10px); }
  #kpis .k { text-align:center; min-width:78px; }
  #kpis .kv { font-family:var(--mono); font-size:18px; font-weight:700; }
  #kpis .kl { font-size:8px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
  /* alerts */
  #alerts { position:absolute; right:18px; bottom:18px; width:230px; background:var(--card); border:1px solid var(--border);
            border-radius:12px; padding:10px 12px; backdrop-filter:blur(10px); max-height:38vh; overflow:auto; }
  #alerts h3 { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:8px;
               display:flex; align-items:center; gap:6px; }
  #alerts .a { font-size:11px; padding:6px 8px; border-radius:6px; border:1px solid var(--border); margin-bottom:5px;
               border-left:3px solid var(--warn); }
  #alerts .a.critical { border-left-color:var(--bad); }
  #alerts .a .t { font-weight:700; } #alerts .a .s { color:var(--muted); font-size:10px; }
  /* header + edit bar */
  #hdr { position:absolute; left:18px; top:16px; display:flex; align-items:center; gap:10px; }
  #hdr svg { width:34px; height:26px; } #hdr .t { font-weight:800; letter-spacing:2px; font-size:15px; }
  #hdr .sub { font-size:10px; color:var(--muted); letter-spacing:1px; }
  #editbar { position:absolute; left:50%; top:16px; transform:translateX(-50%); display:none; gap:8px;
             background:var(--card); border:1px solid var(--teal); border-radius:8px; padding:6px 10px; font-size:11px; align-items:center; }
  body.edit #editbar { display:flex; }
  #editbar button { background:var(--teal); border:none; color:#04121A; border-radius:5px; padding:5px 10px; font-weight:700; cursor:pointer; }
  #conn { position:absolute; right:18px; top:16px; font-size:10px; font-family:var(--mono); color:var(--muted); }
  #conn .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--good); margin-right:5px; }
</style>
</head>
<body>
<div id="stage">
  <div id="frame">
    <img id="render" alt="Killdeer Field digital twin" />
    <div id="missing" style="display:none;">
      <div style="font-size:15px;color:#E2E8F0;font-weight:700;">Drop your render here</div>
      <div>Save the diorama image as</div>
      <code>dashboard/images/killdeer-twin-render.png</code>
      <div style="font-size:11px;">then reload. Pins + live data overlay automatically.</div>
    </div>
    <!-- pins injected here -->
  </div>
</div>

<div id="hdr">
  <svg viewBox="190 140 590 440" xmlns="http://www.w3.org/2000/svg" aria-label="Aevus">
    <path fill="#06b6d4" d="M487.44,154.66c10.46-4.08,24.78-1.69,36.06-2.31,4.74-.26,12.18-.14,16.76.47,3.7.48,7.31,1.49,10.72,2.99,5.33,2.39,9.97,6.09,13.49,10.74,3.82,4.97,12.72,23.25,15.96,29.94,4.54,9.37,11.98,22.39,15.89,31.45,3.46,6.57,6.9,13.35,10.19,20.02,22.69,45.91,46.99,91.36,69.13,137.52l-54.16.03c-47.07.05-40.06,1.97-61.26-40.55l-24.62-49.05c-5.47-10.93-11.17-22.96-16.98-33.55l-99.6,199.06-24,48.21c-4.73,9.53-15.11,33.59-21.58,40.09-3.73,3.73-7.79,5.98-12.96,7.08-9.93,2.12-22.72.89-32.91.89l-55.33-.04c6.92-15.9,18.4-37.39,26.3-53.26l53.2-106.42,81.39-160.83c10.86-21.02,21.74-42.03,32.68-63.01,4.66-8.94,11.7-16.59,21.66-19.47Z"/>
    <path fill="#6366f1" d="M511.32,414.05c47.71-1.69,93.76.15,140.41-.7,25.11-1.16,40.33,1.6,51.03,26.81,19.12,38.52,39.61,76.78,58.21,114.48,1.64,5.09-5.72,2.33-9.89,3.04-18.94.02-35.99-.06-51.35.2-8.83.11-19.09.79-27.19-2.97-15.85-8.98-18.9-25.07-30.04-43.89-4.65-6.71-11.13-28.17-17.11-28.89-54.24-.39-110.5.43-164.82,0-4.63-.17-4.18-1.93-2.04-5.83,14.56-21.76,22.41-58.69,52.78-62.25Z"/>
  </svg>
  <div><div class="t">KILLDEER FIELD</div><div class="sub">Digital Twin · Live</div></div>
</div>
<div id="conn"><span class="dot"></span><span id="conntxt">connecting…</span></div>
<div id="editbar"><span>EDIT MODE — drag pins</span><button onclick="copyPos()">Copy positions</button></div>

<div id="kpis"></div>
<div id="alerts"><h3>● Active Alerts</h3><div id="alertlist" style="color:var(--muted);font-size:11px;">—</div></div>

<script>
(function(){
  "use strict";
  var qs = new URLSearchParams(location.search);
  var EDIT = qs.get("edit") === "1";
  if (EDIT) document.body.classList.add("edit");
  var IMG = "/dashboard/images/killdeer-twin-render.png";

  // Pin positions in % of the image (estimated from the render; tune in edit mode).
  // id = canonical twin node id; label = short name shown on the pin.
  var PINS = {
    WH:{x:25,y:32,l:"Wellhead"}, CMP:{x:28,y:35,l:"Compressor"}, HTR:{x:45,y:33,l:"Line Heater"},
    CHE:{x:62,y:35,l:"Chem Injection"}, SEP:{x:40,y:53,l:"2-Phase Separator"}, FLR:{x:6,y:52,l:"Flare"},
    OT1:{x:47,y:73,l:"Stock Tank #1"}, OT2:{x:60,y:73,l:"Stock Tank #2"}, PWT:{x:50,y:64,l:"Produced Water"},
    EFM:{x:87,y:68,l:"EFM / Custody"}, RTU:{x:73,y:53,l:"RTU / PLC"}, TWR:{x:74,y:24,l:"Radio Tower"},
    PWR:{x:16,y:68,l:"Power System"}
  };

  var frame = document.getElementById("frame");
  var pinEls = {};
  function buildPins(){
    Object.keys(PINS).forEach(function(id){
      var p = PINS[id];
      var el = document.createElement("div");
      el.className = "pin"; el.dataset.id = id;
      el.style.left = p.x + "%"; el.style.top = p.y + "%"; el.style.color = "var(--good)";
      el.innerHTML = '<span class="dot live"></span><span class="lbl">'+p.l+'<b data-v></b></span>';
      frame.appendChild(el); pinEls[id] = el;
      if (EDIT) makeDraggable(el, id);
    });
  }

  function setStatus(id, status, extra){
    var el = pinEls[id]; if(!el) return;
    var c = status==="bad" ? "var(--bad)" : status==="warn" ? "var(--warn)" :
            status==="offline"||status==="unknown" ? "var(--muted)" : "var(--good)";
    el.style.color = c;
    var v = el.querySelector("[data-v]"); if (v) v.textContent = extra || "";
  }

  // ── LIVE DATA (server-authoritative, joined by id) ─────────────────────────
  function api(path){ return fetch(path, {credentials:"same-origin"}).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }); }

  function refresh(){
    // 1) twin flow → per-node status (a node is as-bad-as its worst connected pipe)
    api("/api/v1/twin/facility/killdeer/flow").then(function(d){
      var worst = {};
      if (d && d.segments) {
        d.segments.forEach(function(s){
          var a = s.from || s["from"], b = s.to, st = s.status || "good";
          [a,b].forEach(function(n){ if(!n) return;
            var rank = {good:0,warn:1,bad:2}; if ((rank[st]||0) >= (rank[worst[n]]||0)) worst[n] = st; });
        });
      }
      Object.keys(PINS).forEach(function(id){ setStatus(id, worst[id] || "good"); });
      mark(true);
    });
    // 2) health summary → KPI strip
    api("/api/v1/health/summary").then(function(d){ if (d) renderKpis(d); });
    // 3) alerts
    api("/api/v1/alerts").then(function(d){ renderAlerts(d); });
  }

  function renderKpis(d){
    var k = document.getElementById("kpis");
    var avg = d.avg_health!=null ? d.avg_health : (d.overall_health!=null ? d.overall_health : "—");
    var total = d.total!=null ? d.total : (d.asset_count!=null ? d.asset_count : "—");
    var online = d.online!=null ? d.online : "—";
    var hc = (typeof avg==="number") ? (avg>=80?"var(--good)":avg>=50?"var(--warn)":"var(--bad)") : "#E2E8F0";
    k.innerHTML =
      kpi("SITE HEALTH", avg, hc) + kpi("ASSETS", total) + kpi("ONLINE", online) +
      kpi("STATUS", "LIVE", "var(--teal)");
  }
  function kpi(label,val,color){ return '<div class="k"><div class="kv" style="color:'+(color||"#E2E8F0")+'">'+val+'</div><div class="kl">'+label+'</div></div>'; }

  function renderAlerts(d){
    var list = document.getElementById("alertlist");
    var arr = Array.isArray(d) ? d : (d && d.alerts) ? d.alerts : [];
    arr = arr.filter(function(a){ return (a.status||"open")!=="resolved"; }).slice(0,6);
    if (!arr.length){ list.innerHTML = '<div style="color:var(--good);">No active alerts</div>'; return; }
    list.innerHTML = arr.map(function(a){
      var sev = (a.severity||"warning")==="critical" ? "critical" : "";
      return '<div class="a '+sev+'"><div class="t">'+(a.message||a.title||"Alert")+'</div><div class="s">'+(a.asset_name||a.asset_id||"")+'</div></div>';
    }).join("");
  }

  function mark(ok){ var t=document.getElementById("conntxt"); if(t) t.textContent = ok ? "live · "+new Date().toLocaleTimeString() : "offline"; }

  // ── EDIT MODE (drag pins, copy config) ─────────────────────────────────────
  function makeDraggable(el, id){
    var down=false;
    el.addEventListener("mousedown", function(e){ down=true; el.classList.add("drag"); e.preventDefault(); });
    window.addEventListener("mousemove", function(e){
      if(!down) return; var r = frame.getBoundingClientRect();
      var x = Math.max(0,Math.min(100, (e.clientX-r.left)/r.width*100));
      var y = Math.max(0,Math.min(100, (e.clientY-r.top)/r.height*100));
      el.style.left=x+"%"; el.style.top=y+"%"; PINS[id].x=+x.toFixed(1); PINS[id].y=+y.toFixed(1);
    });
    window.addEventListener("mouseup", function(){ down=false; el.classList.remove("drag"); });
  }
  window.copyPos = function(){
    var out = {}; Object.keys(PINS).forEach(function(id){ out[id]={x:PINS[id].x,y:PINS[id].y,l:PINS[id].l}; });
    var txt = JSON.stringify(out,null,2);
    navigator.clipboard && navigator.clipboard.writeText(txt);
    alert("Pin positions copied to clipboard — paste them to me and I'll bake them in.\n\n"+txt);
  };

  // ── BOOT ───────────────────────────────────────────────────────────────────
  var img = document.getElementById("render");
  img.onload = function(){ document.getElementById("missing").style.display="none"; buildPins(); refresh(); setInterval(refresh, 6000); };
  img.onerror = function(){ document.getElementById("missing").style.display="flex"; img.style.display="none"; mark(false); };
  img.src = IMG;
})();
</script>
</body>
</html>
