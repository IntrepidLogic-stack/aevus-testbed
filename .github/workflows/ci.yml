name: Aevus CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          # Pin the web stack to the versions prod runs. `-e ".[dev]"` resolves
          # pyproject floors (fastapi>=0.109.0, starlette unpinned) and pulls a
          # newer FastAPI/Starlette (0.139/1.3) than the deployed build
          # (fastapi==0.136.1, starlette==1.0.0 per requirements.txt), whose
          # route model makes test_imports find 0 /api/v1 routes — CI was
          # testing a stack prod never runs. (requirements.txt can't be
          # installed wholesale in CI: its first line is a git+ssh editable
          # self-reference that has no deploy key on the runner.)
          pip install "fastapi==0.136.1" "starlette==1.0.0"
      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml
        env:
          AEVUS_ENV: test
          API_KEY: test-key-ci
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install bandit safety
      - name: Bandit security scan
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true
      - name: Check for known vulnerabilities
        run: pip install -r requirements.txt && safety check --output json > safety-report.json || true
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  gate:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Gate
        run: echo "All CI checks passed — ready to deploy"

  deploy:
    name: Deploy to EC2
    needs: gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Serialize deploys so rapid pushes don't fire overlapping webhooks. The box
    # also holds a flock (deploy/deploy.sh) as the authoritative serializer; this
    # is defense-in-depth at the CI layer. Queue (don't cancel) so each completes.
    concurrency:
      group: aevus-deploy
      cancel-in-progress: false
    steps:
      - name: Trigger deploy webhook
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          curl -sf -X POST -H "X-Deploy-Secret: ${DEPLOY_SECRET}" https://aevus.intrepidlogic.io/api/v1/deploy/trigger
