# CI lint check — fallback if pre-commit isn't installed locally.
# Same ruff rule set as .pre-commit-config.yaml (Task #53).

name: lint

on:
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/lint.yml"
  push:
    branches: [main, edge]
    paths:
      - "**.py"
      - "pyproject.toml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
